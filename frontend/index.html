<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Siparis Portal Girisi</title>
  <link rel="stylesheet" href="./styles.css">
</head>
<body class="portal-body">
  <div class="portal-shell">
    <header class="brand-bar">
      <div class="brand-lockup">
        <div>
          <strong>Satis Siparis Portali</strong>
          <p>Yem ve bayi operasyonlari icin kurumsal saha ekrani</p>
        </div>
      </div>
    </header>

    <section class="portal-login-wrap">
      <div class="login-panel">
        <p class="eyebrow">Giris yap</p>
        <h2>Hesabina giris yap</h2>
        <form id="loginForm" class="stack-form">
          <label>
            Kullanici adi
            <input id="usernameInput" type="text" name="username" placeholder="Kullanici adi" required>
          </label>
          <label>
            Sifre
            <input id="passwordInput" type="password" name="password" placeholder="Sifre" required>
          </label>
          <button type="submit">Portala gir</button>
        </form>
        <p id="loginMessage" class="muted login-message">
          Giris icin size tanimlanan kullanici adi ve sifreyi kullanin.
        </p>
      </div>
    </section>
  </div>

  <script>
    const SESSION_KEY = "sales-order-system-user";
    const AUTH_KEY = "sales-order-system-auth";
    const form = document.getElementById("loginForm");
    const message = document.getElementById("loginMessage");

    form.addEventListener("submit", async (event) => {
      event.preventDefault();
      const formData = new FormData(form);
      const username = String(formData.get("username") || "").trim().toLowerCase();
      const password = String(formData.get("password") || "").trim();

      const response = await fetch("./api/login", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ username, password })
      });

      if (!response.ok) {
        message.textContent = "Kullanici adi veya sifre hatali.";
        message.classList.add("error-text");
        return;
      }

      const data = await response.json();

      localStorage.setItem(SESSION_KEY, data.user.id);
      localStorage.setItem(AUTH_KEY, "true");
      window.location.href = "./order-create.html";
    });
  </script>
</body>
</html>
